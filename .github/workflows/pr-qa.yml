name: PR QA
on: { pull_request: { branches: [main] } }
permissions: { contents: read }
concurrency: { group: "pr-qa-${{ github.event.pull_request.number }}", cancel-in-progress: true }
jobs:
  unit-and-safety:
    name: Unit and safety checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test && npm run qa:syntax && npm run qa:version && npm run qa:workflows && npm run state:check && npm run build:qa && npm run qa:safety && git diff --check
        env: { BASE_REF: "${{ github.event.pull_request.base.sha }}" }
  desktop:
    name: Desktop Chromium QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci && npx playwright install --with-deps chromium && npm run build:qa && npx playwright test --project=desktop-chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: desktop-chromium-artifacts, path: 'playwright-report test-results', retention-days: 14 }
  mobile:
    name: Mobile Chromium QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci && npx playwright install --with-deps chromium && npm run build:qa && npx playwright test --project=mobile-chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: mobile-chromium-artifacts, path: 'playwright-report test-results', retention-days: 14 }
