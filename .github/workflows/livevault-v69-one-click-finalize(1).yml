          APAFAA==
          __LIVEVAULT_V69_PAYLOAD__
          base64 --decode /tmp/livevault-v69-payload.b64 > /tmp/livevault-v69-payload.tar.gz
          echo "a2d4e2b5a7f1b335967245c50cb4bc4d4fe2430607437433bdf97a4d7c94c9a0  /tmp/livevault-v69-payload.tar.gz" | sha256sum --check
          tar -xzf /tmp/livevault-v69-payload.tar.gz -C /tmp
          test "$(git merge-base HEAD "$BASE_COMMIT")" = "$BASE_COMMIT"

          python3 - <<'PY_STAGE'
          import os
          import subprocess

          base = os.environ['BASE_COMMIT']
          expected = {
              '.livevault-handoff/apply-overlay.sh',
              '.github/workflows/livevault-v69-one-click-finalize.yml',
          }
          actual = {
              line.strip()
              for line in subprocess.check_output(
                  ['git', 'diff', '--name-only', base, 'HEAD', '--'],
                  text=True,
              ).splitlines()
              if line.strip()
          }
          if actual != expected:
              raise SystemExit(
                  'guarded staging-scope mismatch\nmissing: '
                  + repr(sorted(expected - actual))
                  + '\nunexpected: '
                  + repr(sorted(actual - expected))
              )
          print(f'guarded staging scope verified: {len(actual)} paths')
          PY_STAGE

      - name: Verify authoritative base and apply feature
        shell: bash
        run: |
          set -euo pipefail
          git worktree add --detach /tmp/livevault-authoritative-base "$BASE_COMMIT"
          python3 /tmp/livevault-v69-publish-payload/verify_baseline.py /tmp/livevault-authoritative-base
          git worktree remove --force /tmp/livevault-authoritative-base

          git checkout "$BASE_COMMIT" -- .
          git rm -r --ignore-unmatch .livevault-handoff
          git rm -f --ignore-unmatch .github/workflows/livevault-v69-one-click-finalize.yml
          git add -A
          git diff --cached --quiet "$BASE_COMMIT" --

          cp -a /tmp/livevault-v69-publish-payload/overlay/. .
          python3 /tmp/livevault-v69-publish-payload/transforms/patch-research-release-fallback.py scripts/research.js
          python3 /tmp/livevault-v69-publish-payload/transforms/patch-research-release-fallback.py --self-test

      - name: Verify exact feature scope
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          python3 - <<'PY_SCOPE'
          from pathlib import Path
          import os
          import subprocess

          base = os.environ['BASE_COMMIT']
          expected = {
              line.replace(' (applied by hash-checked transform)', '').strip()
              for line in Path('/tmp/livevault-v69-publish-payload/CHANGED_FILES.txt').read_text().splitlines()
              if line.strip()
          }
          actual = {
              line.strip()
              for line in subprocess.check_output(
                  ['git', 'diff', '--cached', '--name-only', base, '--'],
                  text=True,
              ).splitlines()
              if line.strip()
          }
          if actual != expected:
              raise SystemExit(
                  'changed-path mismatch\nmissing: '
                  + repr(sorted(expected - actual))
                  + '\nunexpected: '
                  + repr(sorted(actual - expected))
              )
          print(f'exact feature scope verified: {len(actual)} paths')
          PY_SCOPE
          git diff --cached --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies and Chromium
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run complete synthetic QA
        run: npm run qa:all

      - name: Run dedicated offline PWA QA
        run: npm run qa:pwa

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structured-release-alerts-v69-finalization
          path: |
            playwright-report/
            test-results/
            dist/qa-build.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit and publish validated feature
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --exit-code
          git diff --cached --check
          git commit -F /tmp/livevault-v69-publish-payload/COMMIT_MESSAGE.txt
          FINAL_SHA=$(git rev-parse HEAD)
          git push origin "HEAD:refs/heads/$FEATURE_BRANCH"
          echo "final_sha=$FINAL_SHA" >> "$GITHUB_OUTPUT"

      - name: Run final-commit PWA workflow
        id: final-pwa
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.publish.outputs.final_sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run full-pwa-qa.yml --ref "$FEATURE_BRANCH"
          RUN_ID=""
          for attempt in $(seq 1 30); do
            RUN_ID=$(gh run list               --workflow full-pwa-qa.yml               --branch "$FEATURE_BRANCH"               --event workflow_dispatch               --limit 10               --json databaseId,headSha,createdAt               --jq ".[] | select(.headSha == \"$FINAL_SHA\") | .databaseId"               | head -n 1)
            if [ -n "$RUN_ID" ]; then break; fi
            sleep 4
          done
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --exit-status

      - name: Record successful validation and open draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.publish.outputs.final_sha }}
          PWA_RUN_ID: ${{ steps.final-pwa.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          PWA_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$PWA_RUN_ID"
          gh api             --method POST             "repos/$GITHUB_REPOSITORY/statuses/$FINAL_SHA"             -f state=success             -f context='LiveVault v69 finalization'             -f description='Full synthetic QA and offline PWA QA passed'             -f target_url="$RUN_URL" >/dev/null

          cp /tmp/livevault-v69-publish-payload/PR_BODY.md /tmp/livevault-v69-pr-body.md
          cat >> /tmp/livevault-v69-pr-body.md <<EOF_PR

          ## Final automated validation

          - Complete synthetic QA passed in the guarded finalization run: $RUN_URL
          - Final-commit offline PWA QA passed: $PWA_URL
          - Exact 29-path feature scope, v69 version/cache synchronization, fixtures, safety checks, desktop/mobile Playwright, and offline shell checks passed.
          - No production workflow, provider API, Worker/R2 write, merge, or deployment was performed.
          EOF_PR

          EXISTING=$(gh pr list --state open --head "$FEATURE_BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING"               --title 'Add structured release lifecycle alerts'               --body-file /tmp/livevault-v69-pr-body.md
            echo "Updated draft pull request #$EXISTING"
          else
            gh pr create               --draft               --base main               --head "$FEATURE_BRANCH"               --title 'Add structured release lifecycle alerts'               --body-file /tmp/livevault-v69-pr-body.md
          fi
