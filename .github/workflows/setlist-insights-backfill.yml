name: Live-performance rarity insights backfill
run-name: Live-performance rarity insights backfill — @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Confirm this bounded backfill may update setlistInsights on attended past concerts
        required: true
        type: boolean
        default: false
      max_concerts:
        description: Number of concerts to process (1-10; default 5)
        required: false
        default: '5'
      force_recalculate:
        description: Recalculate current insight records
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: live-vault-data-writes
  cancel-in-progress: false
  queue: max

jobs:
  setlist-insights-backfill:
    if: ${{ inputs.confirm == true && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run bounded setlist insight backfill
        env:
          CF_WORKER_ENDPOINT: ${{ secrets.CF_WORKER_ENDPOINT }}
          CF_WORKER_TOKEN: ${{ secrets.CF_WORKER_TOKEN }}
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}
          MAX_CONCERTS: ${{ inputs.max_concerts }}
          FORCE_RECALCULATE: ${{ inputs.force_recalculate }}
        run: node scripts/setlistInsightsBackfill.js
