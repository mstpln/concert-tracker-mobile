<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Live Vault</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="theme-color" content="#111214" />
<link rel="stylesheet" href="app.css" />
</head>
<body>

<div id="onboarding" class="screen">
  <div class="onboarding-inner">
    <div class="onboarding-icon"></div>
    <h1>Concert tracker</h1>
    <p>
      Connect this app to your Cloudflare Worker so it can read and write your
      band list and concert data. See SETUP.md for how to get the URL and
      token below.
    </p>
    <label for="connect-endpoint">Worker URL</label>
    <input type="text" id="connect-endpoint" placeholder="https://concert-tracker-api.yoursubdomain.workers.dev" />
    <label for="connect-token">Access token</label>
    <input type="password" id="connect-token" placeholder="Paste the token from your Worker setup" />
    <button id="connect-submit" class="btn-primary btn-block">Connect</button>
    <p id="onboarding-error" class="error hidden"></p>
  </div>
</div>

<div id="app" class="hidden">
  <div id="brand-banner" class="brand-banner">THE LIVE VAULT</div>
  <header id="app-header">
    <button id="back-btn" class="icon-btn hidden" aria-label="Back"></button>
    <div class="header-brand">
      <span id="header-icon" class="header-icon"></span>
      <span id="header-title" class="header-title"><span class="brand-blue">CONCERT</span>DATES</span>
    </div>
    <button id="nearby-toggle-btn" class="icon-btn" aria-label="Show nearby only" title="Show nearby only"></button>
    <button id="europe-toggle-btn" class="icon-btn" aria-label="Show Europe only" title="Show Europe only"></button>
    <button id="settings-btn" class="icon-btn" aria-label="Settings"></button>
  </header>

  <main id="content">
    <section id="screen-concerts" class="screen hidden"></section>
    <section id="screen-myconcerts" class="screen"></section>
    <section id="screen-mybands" class="screen hidden"></section>
    <section id="screen-news" class="screen hidden"></section>
    <section id="screen-profile" class="screen hidden"></section>
    <section id="screen-venue-detail" class="screen hidden"></section>
    <section id="screen-settings" class="screen hidden"></section>
    <section id="screen-stats" class="screen hidden"></section>
    <section id="screen-connection-error" class="screen hidden">
      <div class="screen-empty">
        <p>Couldn't reach your data. Check your connection and try again.</p>
        <button id="retry-connect-btn" class="btn-primary" style="margin-top:12px">Retry</button>
      </div>
    </section>
  </main>

  <nav id="tabbar">
    <button class="tabitem active" data-tab="myconcerts">
      <span class="tab-icon"></span>My Concerts
    </button>
    <button class="tabitem" data-tab="concerts">
      <span class="tab-icon"></span>Concerts
    </button>
    <button class="tabitem" data-tab="mybands">
      <span class="tab-icon"></span>Bands
    </button>
    <button class="tabitem" data-tab="news">
      <span class="tab-icon-wrap"><span class="tab-icon"></span><span id="news-unread-dot" class="tab-unread-dot hidden"></span></span>Alerts
    </button>
  </nav>
</div>

<script src="version.js"></script>
<script src="icons.js"></script>
<script src="dataLib.js"></script>
<script src="remoteStore.js"></script>
<script src="musicbrainzState.js"></script>
<script src="app.js"></script>
</body>
</html>
